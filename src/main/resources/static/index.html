<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Food App</title>

    <!-- CSS LINK -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">

</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="auth-box">
    <h1>Login</h1>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <p>Don't have account? <a href="#" onclick="showSignup()">Signup</a></p>
</div>


<!-- SIGNUP PAGE -->
<div id="signupPage" class="auth-box hidden">
    <h1>Signup</h1>
   <label>What should we call you?</label>
<input id="signupName" placeholder="name">

<label>Email address</label>
<input id="signupEmail" placeholder="email">

<label>Password</label>
<input id="signupPassword" type="password" placeholder="password">

<small>Password must be at least 4 characters</small>
    <button onclick="signup()">Signup</button>

    <p>Already have account? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- MAIN APP -->
<div id="appPage" class="hidden">

    <div class="navbar">
         <!-- <span style="font-size: 30px;">🍔</span> -->
    <h1>🍔FoodRush</h1>


<div class="nav-center">
    <input type="text" 
       placeholder="🔍Search restaurants..." 
       class="search-box" 
       onkeyup="searchRestaurants()">
</div>



    <div class="nav-right">
        <button onclick="logout()">Logout</button>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
    </div>
</div>

<div id="menu" class="hidden menu-box">
    <p onclick="goToHistory()">Order History</p>
    <p onclick="goToProfile()">Profile</p>
    <p onclick="goToHelp()">Help</p>
</div>

<div class="filter-container">

    <button class="filter-btn active" onclick="filterCategory('')">🍽 All</button>

    <button class="filter-btn" onclick="filterCategory('North Indian')">🍜 North Indian</button>

    <button class="filter-btn" onclick="filterCategory('South Indian')">🍛 South Indian</button>

    <button class="filter-btn" onclick="filterCategory('Fast Food')">🍔 Fast Food</button>

    <button class="filter-btn" onclick="filterCategory('Dessert')">🍰 Dessert</button>

    <button class="filter-btn" onclick="filterCategory('Healthy')">🥗 Healthy</button>

</div>

    <div class="container">

        <h2>Restaurants</h2>
        <div id="restaurants"></div>

        <h2>Food Items</h2>
        <div id="food"></div>

        <h2>Cart</h2>
        <ul id="cart"></ul>

        <button onclick="placeOrder()">Place Order</button>

    </div>

</div>

<!--  JS LINK  -->
<script src="cart.js"></script>

</body>
</html>
